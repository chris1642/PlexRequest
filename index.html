<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Movie/TV Show</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; margin: 0; background: #f4f4f4; }
        .container { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: auto; }
        
        .selected { display: none; background: #fff; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .selected img { width: 100%; max-width: 250px; margin: 10px auto; border-radius: 8px; }
        
        .search-section { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .search-section input { width: 90%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        .search-section button { width: 100%; padding: 10px; margin-top: 10px; font-size: 16px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .search-section button:hover { background: #0056b3; }

        .search-results { margin-top: 10px; max-height: 300px; overflow-y: auto; border-radius: 8px; background: #fff; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .result { cursor: pointer; padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; transition: background 0.2s; }
        .result:hover { background-color: #f0f0f0; }
        
        .poster { width: 70px; height: 105px; object-fit: cover; border-radius: 5px; }
        .label { padding: 4px 8px; font-size: 12px; border-radius: 4px; color: white; }
        .movie-label { background-color: #007bff; }
        .tv-label { background-color: #28a745; }

        .submit-btn { margin-top: 15px; width: 100%; padding: 12px; font-size: 18px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .submit-btn:hover { background: #218838; }

        @media (min-width: 600px) {
            .container { flex-direction: row; gap: 30px; }
            .selected, .search-section { flex: 1; }
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Request a Movie or TV Show</h2>

    <div class="container">
        <div class="selected" id="selectedContainer">
            <h3>Selected Title:</h3>
            <img id="selectedPoster" src="" alt="Poster">
            <p id="selectedTitle"></p>
            <span id="selectedType" class="label"></span>

            <form id="requestForm">
                <input type="hidden" id="title" name="title">
                <input type="hidden" id="type" name="type">
                <input type="hidden" id="tmdbId" name="tmdbId">
                <input type="hidden" id="tvdbId" name="tvdbId">
                <button type="button" class="submit-btn" id="submitRequest">Submit Request</button>
            </form>
        </div>

        <div class="search-section">
            <label for="search">Search for a title:</label>
            <input type="text" id="search" placeholder="Enter a movie or TV show name">
            <button onclick="searchTMDb()">Search</button>
            <div id="results" class="search-results"></div>
        </div>
    </div>

    <script>
        const apiKey = "3ce9bf760c181a5a4283fc37f6b153d8"; 
        const radarrApiKey = "578de20b26c0407f9976f93fe748e6b1";  
        const sonarrApiKey = "2dc6ff408d6042f692fcf2ac51a498b5";  
        const radarrUrl = "http://localhost:7878/api/v3";  
        const sonarrUrl = "http://localhost:8989/api/v3";  
        const imageBaseUrl = "https://image.tmdb.org/t/p/w300"; 

        document.getElementById("search").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {  
                event.preventDefault(); 
                searchTMDb();
            }
        });

        function searchTMDb() {
            const query = document.getElementById("search").value;
            if (!query) return;

            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    const resultsDiv = document.getElementById("results");
                    resultsDiv.innerHTML = "";

                    data.results.forEach(item => {
                        if (item.media_type === "movie" || item.media_type === "tv") {
                            const resultDiv = document.createElement("div");
                            resultDiv.className = "result";

                            const posterPath = item.poster_path ? imageBaseUrl + item.poster_path : "https://via.placeholder.com/100x150?text=N/A";

                            const label = item.media_type === "movie"
                                ? `<span class="label movie-label">Movie</span>`
                                : `<span class="label tv-label">TV Show</span>`;

                            resultDiv.innerHTML = `
                                <img class="poster" src="${posterPath}" alt="Poster">
                                <div>
                                    <strong>${item.title || item.name}</strong> ${label}
                                </div>
                            `;

                            resultDiv.onclick = () => selectItem(item, posterPath);
                            resultsDiv.appendChild(resultDiv);
                        }
                    });
                })
                .catch(error => console.error("Error fetching TMDb data:", error));
        }

        function selectItem(item, posterPath) {
            document.getElementById("selectedContainer").style.display = "block";
            document.getElementById("selectedTitle").innerText = `${item.title || item.name}`;
            document.getElementById("selectedPoster").src = posterPath;
            document.getElementById("selectedType").innerText = item.media_type === "movie" ? "Movie" : "TV Show";
            document.getElementById("title").value = item.title || item.name;
            document.getElementById("type").value = item.media_type;
            document.getElementById("tmdbId").value = item.id;
        }

        document.getElementById("submitRequest").addEventListener("click", submitRequest);

        async function submitRequest(event) {
            event.preventDefault();
            alert("✅ Request submitted! (API call simulation)");
        }
    </script>

</body>
</html>
